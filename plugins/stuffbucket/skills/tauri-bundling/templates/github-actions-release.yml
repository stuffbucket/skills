# .github/workflows/release.yml
#
# Multi-OS release pipeline for a Tauri v2 app using tauri-apps/tauri-action.
# - Triggers manually or on push to the `release` branch.
# - Matrix: macOS (Apple Silicon + Intel), Linux x64, Linux ARM64, Windows x64.
# - Signs macOS + (optionally) Windows artifacts via secrets.
# - Uploads to a draft GitHub Release named `app-v<version>`.
#
# Required repo secrets (omit a section to skip that signing path):
#   macOS:
#     APPLE_CERTIFICATE              - base64 of your Developer ID Application .p12
#     APPLE_CERTIFICATE_PASSWORD     - .p12 password
#     APPLE_SIGNING_IDENTITY         - e.g. "Developer ID Application: ACME (TEAMID)"
#     APPLE_API_ISSUER               - App Store Connect issuer UUID
#     APPLE_API_KEY_ID               - App Store Connect key ID
#     APPLE_API_KEY                  - base64 of the .p8 file (or set APPLE_API_KEY_PATH)
#   Windows (pick one signing backend):
#     WINDOWS_CERTIFICATE            - base64 of .pfx
#     WINDOWS_CERTIFICATE_PASSWORD   - .pfx password
#     # or Azure Trusted Signing creds: AZURE_TENANT_ID / AZURE_CLIENT_ID / AZURE_CLIENT_SECRET
#   Tauri updater (only if you use the updater plugin):
#     TAURI_SIGNING_PRIVATE_KEY
#     TAURI_SIGNING_PRIVATE_KEY_PASSWORD

name: release

on:
  workflow_dispatch:
  push:
    branches:
      - release

jobs:
  publish-tauri:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: --target aarch64-apple-darwin
          - platform: macos-latest
            args: --target x86_64-apple-darwin
          - platform: ubuntu-22.04
            args: ''
          - platform: ubuntu-22.04-arm
            args: ''
          - platform: windows-latest
            args: ''

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      # ---- Linux system deps -------------------------------------------------
      # Pinned to 22.04 so glibc baseline stays compatible with older user systems.
      - name: install dependencies (ubuntu only)
        if: startsWith(matrix.platform, 'ubuntu-22.04')
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      # ---- Toolchains --------------------------------------------------------
      - name: setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: ./src-tauri -> target

      - name: install frontend dependencies
        run: bun install

      # ---- Build + bundle + release -----------------------------------------
      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

          # macOS code signing + notarization (no-op on non-macOS jobs)
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_KEY_PATH: ${{ secrets.APPLE_API_KEY }} # tauri-action accepts base64 here

          # Windows Authenticode (PFX path — Azure Trusted Signing uses signCommand instead)
          WINDOWS_CERTIFICATE: ${{ secrets.WINDOWS_CERTIFICATE }}
          WINDOWS_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}

          # Tauri updater signing (optional)
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: app-v__VERSION__
          releaseName: App v__VERSION__
          releaseBody: |
            See the assets below to download and install this version.
            Auto-update users will receive this release automatically.
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
