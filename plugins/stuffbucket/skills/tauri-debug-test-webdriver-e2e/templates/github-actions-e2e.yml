# .github/workflows/webdriver.yml
#
# Runs the WebdriverIO e2e suite on Linux (headless via xvfb) and Windows
# (native msedgedriver matched to the runner's Edge version). macOS is
# omitted — Tauri does not ship a WKWebView WebDriver.

name: WebDriver
on: [push, pull_request]

jobs:
  test:
    name: WebdriverIO (${{ matrix.platform }})
    runs-on: ${{ matrix.platform }}
    strategy:
      fail-fast: false
      matrix:
        platform: [ubuntu-latest, windows-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Tauri system deps (Linux)
        if: matrix.platform == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            webkit2gtk-driver \
            xvfb

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install matching msedgedriver (Windows)
        if: matrix.platform == 'windows-latest'
        run: |
          cargo install --git https://github.com/chippers/msedgedriver-tool
          & "$HOME/.cargo/bin/msedgedriver-tool.exe"
          $PWD.Path >> $env:GITHUB_PATH

      - name: Install tauri-driver
        run: cargo install tauri-driver --locked

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: yarn

      - run: yarn install --frozen-lockfile
      - run: yarn install --frozen-lockfile
        working-directory: e2e-tests

      # Sanity: cargo tests run faster than the full app boots — fail fast.
      - run: cargo test
        working-directory: src-tauri

      - name: WebdriverIO (Linux)
        if: matrix.platform == 'ubuntu-latest'
        run: xvfb-run --auto-servernum yarn test
        working-directory: e2e-tests

      - name: WebdriverIO (Windows)
        if: matrix.platform == 'windows-latest'
        run: yarn test
        working-directory: e2e-tests

      - name: Upload failure screenshots
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: screenshots-${{ matrix.platform }}
          path: e2e-tests/screenshots/
          if-no-files-found: ignore
