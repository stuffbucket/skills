# permissions/allow-server-control.toml
#
# A permission *set* bundling multiple autogenerated `allow-*` permissions
# under one identifier. Consumers grant the whole feature with one entry in
# their capability:
#
#   "permissions": ["example-server:allow-server-control"]
#
# Sets compose other permissions; they do not declare commands.allow / scope
# directly. For a single-command grant, just use the autogenerated allow-<cmd>.

"$schema" = "schemas/schema.json"

[[set]]
identifier = "allow-server-control"
description = """
Full lifecycle control over the embedded server — start, stop, and ping.
Grant this only to trusted windows; it implies the ability to bind a
local TCP socket.
"""
permissions = [
    "allow-start-server",
    "allow-stop-server",
    "allow-ping",
]
