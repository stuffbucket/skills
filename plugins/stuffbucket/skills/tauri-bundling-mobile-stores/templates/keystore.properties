# Android keystore properties for a Tauri v2 app.
#
# Location: src-tauri/gen/android/keystore.properties
# Read by:  src-tauri/gen/android/app/build.gradle.kts (signingConfigs block)
# Status:   NEVER COMMIT THIS FILE. Add to .gitignore.
#
# In CI, write this file at job start from secrets, e.g.:
#   cat > src-tauri/gen/android/keystore.properties <<EOF
#   password=$ANDROID_KEYSTORE_PASSWORD
#   keyAlias=upload
#   storeFile=$RUNNER_TEMP/upload-keystore.jks
#   EOF

# Password for the keystore AND the key. The default Gradle wiring uses
# the same value for both; if you used separate passwords with keytool
# you'll need to split this into two properties and update build.gradle.kts.
password=CHANGE_ME

# Alias passed to `keytool -alias`. Default is `upload` for Play App Signing.
keyAlias=upload

# Absolute path to the .jks file. Use an absolute path — Gradle's
# working dir is src-tauri/gen/android/, not the repo root.
storeFile=/absolute/path/to/upload-keystore.jks
