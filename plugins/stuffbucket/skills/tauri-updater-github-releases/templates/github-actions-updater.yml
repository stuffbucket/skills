# .github/workflows/release.yml
# Full publish workflow: build a signed Tauri v2 release across macOS (ARM + Intel),
# Linux, and Windows, then attach artifacts and generate latest.json on the GitHub
# Release. Triggered by pushing a `v*` tag.
#
# Prerequisites:
#   - Secrets configured (see tauri-updater-signing-keys/templates/github-actions-secrets-list.md):
#       TAURI_SIGNING_PRIVATE_KEY
#       TAURI_SIGNING_PRIVATE_KEY_PASSWORD
#     plus any OS code-signing secrets you use (see [[tauri-bundling]]).
#   - tauri.conf.json has bundle.createUpdaterArtifacts: true and plugins.updater.pubkey set.

name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write  # required for tauri-action to create the GitHub Release

jobs:
  publish:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: --target aarch64-apple-darwin
          - platform: macos-latest
            args: --target x86_64-apple-darwin
          - platform: ubuntu-22.04
            args: ""
          - platform: windows-latest
            args: ""

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - uses: oven-sh/setup-bun@v2

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Install JS deps
        run: bun install --frozen-lockfile

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # --- Tauri updater signature ---
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          # --- macOS code signing + notarization (omit if you don't notarize) ---
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "App v__VERSION__"
          releaseBody: "See the assets to download and install this version."
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}
          # NSIS is the modern Windows installer for the v2 updater. MSI updater is deprecated.
          updaterJsonPreferNsis: true

  # Optional: notify a channel after the release lands.
  notify:
    needs: publish
    runs-on: ubuntu-latest
    if: success()
    steps:
      - name: Announce
        run: echo "Released ${{ github.ref_name }}"
