name: Publish to npm

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    # Skip tags created by auto-patch workflow
    if: "!startsWith(github.event.head_commit.message, 'chore: bump version to')"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          registry-url: https://registry.npmjs.org

      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Validate skills
        run: npm run validate

      - name: Build skill index
        run: npm run build:index

      - name: Test MCP server
        run: node plugins/stuffbucket/skills/skill-router/tests/test-mcp-server.js

      - name: Check llms.txt is up to date
        run: npm run check:llms

      - name: Verify tag matches package.json version
        run: |
          PKG_VERSION="v$(node -p 'require("./package.json").version')"
          if [ "$PKG_VERSION" != "$GITHUB_REF_NAME" ]; then
            echo "Tag $GITHUB_REF_NAME does not match package.json version $PKG_VERSION"
            exit 1
          fi

      - name: Sync manifest versions
        run: |
          VERSION=$(node -p 'require("./package.json").version')
          node -e "
            const fs = require('fs');
            for (const f of ['.claude-plugin/marketplace.json', '.github/plugin/marketplace.json']) {
              const j = JSON.parse(fs.readFileSync(f, 'utf8'));
              j.metadata.version = '$VERSION';
              j.plugins.forEach(p => { p.version = '$VERSION'; });
              fs.writeFileSync(f, JSON.stringify(j, null, 2) + '\n');
            }
            const pj = JSON.parse(fs.readFileSync('plugins/stuffbucket/plugin.json', 'utf8'));
            pj.version = '$VERSION';
            fs.writeFileSync('plugins/stuffbucket/plugin.json', JSON.stringify(pj, null, 2) + '\n');
          "

      - name: Publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --provenance --access public
