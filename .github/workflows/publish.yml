name: Publish to npm

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    # Skip tags created by auto-patch workflow
    if: "!startsWith(github.event.head_commit.message, 'chore: bump version to')"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          registry-url: https://registry.npmjs.org

      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Validate skills
        run: npm run validate

      - name: Build skill index
        run: npm run build:index

      - name: Test MCP server
        run: node plugins/stuffbucket/skills/skill-router/tests/test-mcp-server.js

      - name: Check llms.txt is up to date
        run: npm run check:llms

      - name: Verify tag matches package.json version
        run: |
          PKG_VERSION="v$(node -p 'require("./package.json").version')"
          if [ "$PKG_VERSION" != "$GITHUB_REF_NAME" ]; then
            echo "Tag $GITHUB_REF_NAME does not match package.json version $PKG_VERSION"
            exit 1
          fi

      - name: Verify manifest versions match
        run: npm run check:versions

      - name: Publish
        run: npm publish --provenance --access public
