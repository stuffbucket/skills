name: Publish to npm

on:
  push:
    branches:
      - main
  # Manual recovery: republish the current package.json version without bumping
  # (e.g. a version that landed on main but never reached npm).
  workflow_dispatch:

# Serialize publish runs so concurrent pushes to main can never race on the
# version bump / tag. Never cancel an in-flight publish midway.
concurrency:
  group: publish-to-npm
  cancel-in-progress: false

jobs:
  ci-and-version:
    runs-on: ubuntu-latest
    # Skip the bump commits this workflow creates; always run on manual dispatch.
    if: "${{ github.event_name == 'workflow_dispatch' || !startsWith(github.event.head_commit.message, 'chore: bump version to') }}"
    permissions:
      contents: write
    outputs:
      sha: ${{ steps.version.outputs.sha }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 2

      - uses: actions/setup-node@v6
        with:
          node-version: 24.x
          cache: npm

      - uses: actions/setup-python@v7
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Validate skills
        run: npm run validate

      - name: Build skill index
        run: npm run build:index

      - name: Test MCP server
        run: node plugins/stuffbucket/skills/skill-router/tests/test-mcp-server.js

      - name: Check llms.txt is up to date
        run: npm run check:llms

      - name: Check README is up to date
        run: npm run check:readme

      - name: Bump version, sync manifests, and push
        id: version
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          EVENT="${{ github.event_name }}"
          CURRENT_VERSION=$(node -p 'require("./package.json").version')
          PREV_VERSION=$(git show HEAD~1:package.json 2>/dev/null | node -p 'JSON.parse(require("fs").readFileSync(0,"utf8")).version' 2>/dev/null || echo "")

          if [ "$EVENT" = "workflow_dispatch" ]; then
            echo "Manual dispatch: republishing current version ${CURRENT_VERSION} without bump"
            NEW_VERSION="v${CURRENT_VERSION}"
          elif [ "$CURRENT_VERSION" != "$PREV_VERSION" ] && [ -n "$PREV_VERSION" ]; then
            echo "Version manually changed: $PREV_VERSION → $CURRENT_VERSION"
            NEW_VERSION="v${CURRENT_VERSION}"
          else
            echo "Auto-bumping patch version"
            NEW_VERSION=$(npm version patch --no-git-tag-version)
          fi

          CLEAN_VERSION=${NEW_VERSION#v}

          # Sync version into marketplace and plugin manifests
          node -e "
            const fs = require('fs');
            // Claude Code marketplace (Anthropic schema)
            const claude = JSON.parse(fs.readFileSync('.claude-plugin/marketplace.json', 'utf8'));
            claude.plugins.forEach(p => { p.version = '$CLEAN_VERSION'; });
            fs.writeFileSync('.claude-plugin/marketplace.json', JSON.stringify(claude, null, 2) + '\n');
            // GitHub Copilot marketplace (GitHub schema)
            const gh = JSON.parse(fs.readFileSync('.github/plugin/marketplace.json', 'utf8'));
            gh.metadata.version = '$CLEAN_VERSION';
            gh.plugins.forEach(p => { p.version = '$CLEAN_VERSION'; });
            fs.writeFileSync('.github/plugin/marketplace.json', JSON.stringify(gh, null, 2) + '\n');
            // Plugin manifest
            const pj = JSON.parse(fs.readFileSync('plugins/stuffbucket/.claude-plugin/plugin.json', 'utf8'));
            pj.version = '$CLEAN_VERSION';
            fs.writeFileSync('plugins/stuffbucket/.claude-plugin/plugin.json', JSON.stringify(pj, null, 2) + '\n');
          "

          git add package.json package-lock.json .claude-plugin/marketplace.json .github/plugin/marketplace.json plugins/stuffbucket/.claude-plugin/plugin.json
          COMMITTED=false
          if ! git diff --cached --quiet; then
            git commit -m "chore: bump version to ${NEW_VERSION}"
            COMMITTED=true
          fi

          if [ "$EVENT" = "workflow_dispatch" ]; then
            # Recovery: (re)point the tag at HEAD and force-push only the tag.
            # Push main only if dispatch produced a manifest-sync commit.
            git tag -f "${NEW_VERSION}"
            git push --force origin "refs/tags/${NEW_VERSION}"
            if [ "$COMMITTED" = "true" ]; then git push origin main; fi
          else
            # Atomic: the commit and its tag land together or not at all, so a
            # losing concurrent run can never leave an orphan tag behind.
            git tag "${NEW_VERSION}"
            git push --atomic origin main "refs/tags/${NEW_VERSION}"
          fi

          echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Verify manifest versions match
        run: npm run check:versions

  publish:
    needs: ci-and-version
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ needs.ci-and-version.outputs.sha }}

      - uses: actions/setup-node@v6
        with:
          node-version: 24.x
          cache: npm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: npm ci

      - name: Publish
        run: npm publish --access public
