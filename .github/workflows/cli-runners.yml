name: CLI install runners

# Proves @stuffbucket/skills installs and registers its MCP server under the
# Claude Code, GitHub Copilot, and OpenAI Codex CLIs — keyless, with no LLM
# contacted — using the ghcr.io/stuffbucket/ai-cli-* images.
#
# Only runs when something that could break installation or MCP wiring changes
# (skills + MCP server, the package/bin manifest, or the runners themselves).

on:
  push:
    branches: [main]
    paths: &paths
      - 'plugins/stuffbucket/skills/**'
      - 'package.json'
      - 'package-lock.json'
      - 'tests/runners/**'
      - '.github/workflows/cli-runners.yml'
  pull_request:
    branches: [main]
    paths: *paths
  workflow_dispatch:

permissions:
  contents: read
  packages: read

jobs:
  runner:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        cli: [claude, copilot, codex]
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Harmless for public images; lets the run also work if the ai-cli-*
      # packages are private but grant this repo read access.
      - name: Log in to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Run the ${{ matrix.cli }} CLI runner
        env:
          AI_CLI_PULL: '1'
        run: tests/runners/run.sh ${{ matrix.cli }}

  # Negative control: prove the runner actually discriminates — that it PASSES a
  # good build and FAILS a deliberately broken one. Guards against a green check
  # that can never go red.
  negative-control:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Log in to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Self-test (good build passes, broken build fails)
        env:
          AI_CLI_PULL: '1'
        run: tests/runners/run.sh --self-test claude
