---
name: Bug report
description: Report a problem with a skill, validation, or tooling
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Describe the problem clearly and concisely.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: input
    id: skill
    attributes:
      label: Affected skill (if applicable)
      placeholder: e.g., skill-creator

  - type: dropdown
    id: platform
    attributes:
      label: AI platform
      options:
        - Claude
        - GitHub Copilot
        - Other
        - N/A
